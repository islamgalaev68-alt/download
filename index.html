<html>
<head>
    <meta charset="utf-8">
    <title>Загрузка приложения</title>
    <script>
        window.onload = function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var iosUrl = "https://apps.apple.com/ru/app/ozon-job/id6498711171"; // Ваша ссылка на App Store
            var androidUrl = "https://play.google.com/store/apps/details?id=ru.ozon.hire&hl=ru"; // Ваша ссылка на Google Play
            var fallbackUrl = "https://www.rustore.ru/catalog/app/ru.ozon.hire"; // Ссылка для ПК

            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = iosUrl;
            } else if (/android/i.test(userAgent)) {
                window.location.href = androidUrl;
            } else {
                window.location.href = fallbackUrl;
            }
        }
    </script>
</head>
<body>
    <p>Перенаправление в магазин приложений...</p>
</body>
</html>
